apiVersion: v1
kind: ConfigMap
metadata:
  name: outpost-config
data:
  outpost.yaml: |
    listen: "0.0.0.0:8080"
    state_db: "/data/outpost.db"
    upstreams:
      # Example only — point this at your real MCP server. Use https://
      # in production; Outpost forwards bearer tokens verbatim and never
      # inspects them, so the transport itself must be trusted.
      - name: example
        url: "https://example-mcp-server.internal:9000"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: outpost-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outpost
  labels:
    app: outpost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: outpost
  template:
    metadata:
      labels:
        app: outpost
    spec:
      containers:
        - name: outpost
          # Pin to a real release tag once one exists (goreleaser +
          # .goreleaser.yaml's dockers block build/push this on release —
          # hasn't happened yet, see the README in this directory). Never
          # ship :latest in a manifest meant to be copied as a starting
          # point — it's a mutable-tag supply-chain risk: the same tag
          # can point at different, unaudited image content over time.
          image: ghcr.io/korneza/outpost:v0.9.0
          args: ["serve", "-config", "/etc/outpost/outpost.yaml"]
          ports:
            - containerPort: 8080
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/outpost
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: outpost-config
        - name: data
          persistentVolumeClaim:
            claimName: outpost-data
---
apiVersion: v1
kind: Service
metadata:
  name: outpost
spec:
  selector:
    app: outpost
  ports:
    - port: 8080
      targetPort: 8080
